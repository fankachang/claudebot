<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:">
  <title>ClaudeBot Chat</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">CLAUDEBOT</span>
    </div>
    <div class="titlebar-status">
      <span class="status-dot disconnected" id="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-pin" class="titlebar-btn" title="Always on Top">&#x1F4CC;</button>
      <button id="btn-compact" class="titlebar-btn" title="Compact Mode">&#x25FB;</button>
      <button id="btn-minimize" class="titlebar-btn">&#x2500;</button>
      <button id="btn-close" class="titlebar-btn close">&#x2715;</button>
    </div>
  </div>

  <!-- Connection panel (shown when disconnected) -->
  <div class="connect-panel" id="connect-panel">
    <div class="form-group">
      <label for="relay-url">Server</label>
      <input type="text" id="relay-url" placeholder="ws://1.2.3.4:9877" value="ws://localhost:9877">
    </div>
    <div class="form-group">
      <label for="pairing-code">Pairing Code</label>
      <input type="text" id="pairing-code" placeholder="配對碼" maxlength="8" autocomplete="off">
    </div>
    <button id="btn-connect" class="btn-primary">Connect</button>
  </div>

  <!-- Chat panel (shown when connected) -->
  <div class="chat-panel hidden" id="chat-panel">
    <div class="messages" id="messages"></div>

    <div class="typing-indicator hidden" id="typing-indicator">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <div class="input-bar">
      <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
      <button id="btn-send">SEND</button>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="purify.min.js"></script>
  <script src="chat-renderer.js"></script>
</body>
</html>
